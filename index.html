<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
<title>KPSS Çalışma Asistanı</title>
<link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>

  <div id="name-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-icon">✨</div>
      <h2>Hoş geldin!</h2>
      <p class="modal-text">2026 KPSS yolculuğuna başlamadan önce sana nasıl seslenelim?</p>
      <input id="name-input" type="text" maxlength="20" placeholder="İsmin..." autocomplete="off" />
      <button id="name-submit" class="btn btn-primary btn-block">Başlayalım</button>
    </div>
  </div>

  <div id="app">
    <header class="app-header">
      <div class="brand" id="brand-home">
        <span class="brand-mark">🌙</span>
        <span class="brand-text">KPSS<span class="brand-accent">Hazırlık</span></span>
      </div>
      <nav class="header-nav">
        <button class="nav-btn" id="nav-home">Anasayfa</button>
      </nav>
    </header>

    <main id="view-root" class="view-root"></main>
  </div>

  <script src="src/js/storage.js"></script>
  <script src="src/js/timer.js"></script>
  <script src="src/js/quiz.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
